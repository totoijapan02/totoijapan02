<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>totoi japan - 水引アクセサリー</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* ──────────────────────────────────────────────────────── */
    /* RESET & ROOT VARIABLES */
    /* ──────────────────────────────────────────────────────── */
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    * { 
      max-width: 100%; 
      box-sizing: border-box; 
    }
    :root {
      --crimson: #b8255a;
      --crimson-deep: #8c1a42;
      --blush: #e8a0b8;
      --blush-light: #f7dfe8;
      --blush-pale: #fdf0f4;
      --navy: #1e3068;
      --navy-soft: #3a4e8a;
      --cream: #fdf8f5;
      --cream-dark: #f5ece6;
      --white: #fffcfa;
      --text: #2a2420;
      --text-mid: #7a6a65;
      --text-light: #b0a09a;
      --font: 'Nunito', sans-serif;
      --radius: 18px;
    }
    
    /* ──────────────────────────────────────────────────────── */
    /* BODY & HTML DEFAULTS */
    /* ──────────────────────────────────────────────────────── */
    html { 
      scroll-behavior: smooth; 
    }
    body {
      font-family: var(--font);
      margin: 0;
      padding: 0;
      background: var(--cream);
      color: var(--text);
      font-weight: 400;
      line-height: 1.8;
      overflow-x: hidden;
    }
    
    /* ──────────────────────────────────────────────────────── */
    /* ANIMATIONS */
    /* ──────────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .f1 { animation: fadeUp 0.6s 0s ease both; }
    .f2 { animation: fadeUp 0.6s 0.12s ease both; }
    .f3 { animation: fadeUp 0.6s 0.24s ease both; }
    .f4 { animation: fadeUp 0.6s 0.36s ease both; }

    /* ──────────────────────────────────────────────────────── */
    /* HEADER */
    /* ──────────────────────────────────────────────────────── */
    header {
      background: var(--white);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--blush-light);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }
    .header-logo img {
      height: 48px;
      width: 48px;
      object-fit: contain;
      border-radius: 50%;
    }
    .header-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }
    .header-logo-text .brand {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.12em;
    }
    .header-logo-text .tagline {
      font-size: 0.64rem;
      font-weight: 400;
      color: var(--crimson);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    header nav { 
      display: flex; 
      gap: 1.6rem; 
      align-items: center; 
    }
    header nav a {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--text-mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    header nav a:hover { 
      color: var(--crimson); 
    }
    .ig-btn {
      background: var(--blush-light);
      color: var(--crimson) !important;
      padding: 0.38rem 0.95rem;
      border-radius: 999px;
      font-weight: 500 !important;
      font-size: 0.75rem !important;
      transition: background 0.2s !important;
    }
    .ig-btn:hover { 
      background: var(--blush) !important; 
      color: var(--white) !important; 
    }

    /* ──────────────────────────────────────────────────────── */
    /* HERO */
    /* ──────────────────────────────────────────────────────── */
    .hero {
      background: var(--white);
      padding: 6rem 2rem 5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .hero-logo-wrap { 
      margin-bottom: 2rem; 
    }
    .hero-logo-wrap img {
      width: 140px;
      height: 140px;
      object-fit: contain;
      border-radius: 50%;
      filter: drop-shadow(0 4px 20px rgba(184,37,90,0.15));
    }
    .hero-eyebrow {
      display: inline-block;
      background: var(--blush-pale);
      color: var(--crimson);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      padding: 0.32rem 1rem;
      border-radius: 999px;
      margin-bottom: 1.4rem;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      font-weight: 300;
      line-height: 1.2;
      color: var(--navy);
      letter-spacing: 0.01em;
      margin-bottom: 1.2rem;
    }
    .hero h1 strong {
      font-weight: 600;
      color: var(--crimson);
    }
    .hero-desc {
      max-width: 520px;
      font-size: 0.92rem;
      color: var(--text-mid);
      line-height: 1.95;
      margin-bottom: 2.2rem;
      font-weight: 300;
    }
    .btn-main {
      display: inline-block;
      background: var(--navy);
      color: var(--white);
      padding: 0.82rem 2.1rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-main:hover { 
      background: var(--crimson); 
      transform: translateY(-1px); 
    }

    /* ──────────────────────────────────────────────────────── */
    /* ANNOUNCEMENT BAR */
    /* ──────────────────────────────────────────────────────── */
    .announce-bar {
      background: var(--crimson);
      color: #fffcfa;
      text-align: center;
      padding: 0.55rem 1rem;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
    }
    .announce-bar span { 
      opacity: 0.75; 
      margin: 0 0.6rem; 
    }
    .safety-note {
      padding: 0 2em;
      margin: -0.5em 0 1em;
      font-size: 0.9em;
      color: var(--text-mid);
    }

    /* ──────────────────────────────────────────────────────── */
    /* PHILOSOPHY */
    /* ──────────────────────────────────────────────────────── */
    .philosophy {
      background: var(--navy);
      padding: 5rem 2rem;
      text-align: center;
    }
    .philosophy-inner { 
      max-width: 600px; 
      margin: 0 auto; 
    }
    .phil-eyebrow {
      display: inline-block;
      background: rgba(232,160,184,0.18);
      color: var(--blush);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.4rem;
    }
    .philosophy h2 {
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 400;
      color: var(--white);
      line-height: 1.5;
      margin-bottom: 1.2rem;
      letter-spacing: 0.02em;
    }
    .philosophy p {
      font-size: 0.9rem;
      color: rgba(253,240,244,0.65);
      line-height: 2;
      font-weight: 300;
    }

    /* ──────────────────────────────────────────────────────── */
    /* COLOR BANNER */
    /* ──────────────────────────────────────────────────────── */
    .color-banner-section {
      padding: 3rem 2rem;
      background: var(--cream);
    }
    .color-banner-inner {
      max-width: 1080px;
      margin: 0 auto;
    }
    .color-banner-label {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-mid);
      margin-bottom: 1.5rem;
    }
    .color-banner-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
    }
    .color-banner-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .color-banner-item img {
      width: 100px;
      height: 100px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid var(--blush-light);
      transition: transform 0.2s;
    }
    .color-banner-item img:hover {
      transform: scale(1.05);
    }
    .color-banner-item span {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.05em;
      text-align: center;
    }

    /* ──────────────────────────────────────────────────────── */
    /* PRODUCT NAV TABS */
    /* ──────────────────────────────────────────────────────── */
    .product-nav {
      background: var(--white);
      border-bottom: 1px solid var(--blush-light);
      z-index: 90;
      display: block;
      height: auto;
      overflow: visible;
    }
    .product-nav-inner {
      max-width: 1080px;
      margin: 0 auto;
      display: flex;
      gap: 0;
      padding: 0 2rem;
    }
    .product-nav-tab {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text-mid);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .product-nav-tab:hover { 
      color: var(--crimson); 
    }
    .product-nav-tab.active {
      color: var(--crimson);
      border-bottom-color: var(--crimson);
    }
    .product-nav-tab .tab-count {
      background: var(--blush-pale);
      color: var(--crimson);
      font-size: 0.62rem;
      font-weight: 600;
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
    }

    /* ──────────────────────────────────────────────────────── */
    /* SHOP SECTION */
    /* ──────────────────────────────────────────────────────── */
    .shop-section {
      padding: 4.5rem 2rem;
      background: var(--cream);
    }
    .shop-section.alt { 
      background: var(--cream-dark); 
    }
    .shop-inner { 
      max-width: 1080px; 
      margin: 0 auto; 
    }
    #shop-top {
      scroll-margin-top: 100px;
    }
    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 0.9rem;
      border-bottom: 1px solid var(--blush-light);
    }
    .section-head-left { 
      display: flex; 
      flex-direction: column; 
      gap: 0.2rem; 
    }
    .section-num {
      font-family: 'Zen Maru Gothic', 'Nunito', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      color: var(--blush);
      text-transform: uppercase;
    }
    .section-head h2 {
      font-size: clamp(1.4rem, 2.5vw, 1.9rem);
      font-weight: 400;
      color: var(--navy);
      letter-spacing: 0.04em;
    }
    .see-all {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--crimson);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: letter-spacing 0.2s;
    }
    .see-all:hover { 
      letter-spacing: 0.18em; 
    }

    /* ──────────────────────────────────────────────────────── */
    /* PRODUCT GRID */
    /* ──────────────────────────────────────────────────────── */
    .p-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 1.5rem;
    }
    .p-card {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--blush-light);
      transition: transform 0.22s, box-shadow 0.22s;
    }
    .p-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 36px rgba(184,37,90,0.1);
    }
    .p-img {
      width: 100%;
      aspect-ratio: 1;
      position: relative;
      overflow: hidden;
    }
    .p-gallery {
      display: flex;
      transition: transform 0.3s ease;
      height: 100%;
    }
    .p-gallery-item {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .p-gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .p-gallery-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.9);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: var(--navy);
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 5;
      line-height: 1;
    }
    .p-card:hover .p-gallery-nav { 
      opacity: 1; 
    }
    .p-gallery-nav.prev { 
      left: 8px; 
    }
    .p-gallery-nav.next { 
      right: 8px; 
    }
    .p-gallery-nav:hover { 
      background: rgba(255,255,255,1); 
    }
    .p-gallery-dots {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 5;
    }
    .p-gallery-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: background 0.2s;
    }
    .p-gallery-dot.active { 
      background: rgba(255,255,255,0.95); 
    }
    .p-img.sold::after {
      content: 'SOLD';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.95);
      color: var(--crimson);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      padding: 1rem 2.5rem;
      border: 3px solid var(--crimson);
      border-radius: 8px;
      z-index: 10;
    }
    .p-img.sold { 
      opacity: 0.6; 
    }
    .p-body { 
      padding: 1rem 1.1rem 1.2rem; 
    }
    .p-name {
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.22rem;
      letter-spacing: 0.04em;
    }
    .p-sub {
      font-size: 0.74rem;
      color: var(--text-light);
      margin-bottom: 0.7rem;
      line-height: 1.55;
      font-weight: 400;
    }
    .p-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.6rem;
    }
    .p-price {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--navy);
    }
    .btn-buy {
      display: inline-block;
      background: var(--blush-pale);
      color: var(--crimson);
      padding: 0.42rem 0.95rem;
      border-radius: 999px;
      font-size: 0.71rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-decoration: none;
      transition: background 0.18s, color 0.18s;
    }
    .btn-buy:hover { 
      background: var(--crimson); 
      color: var(--white); 
    }

    /* ──────────────────────────────────────────────────────── */
    /* COMING SOON CARDS */
    /* ──────────────────────────────────────────────────────── */
    .p-card-soon {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      border: 2px dashed var(--blush-light);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .p-card-soon-inner {
      text-align: center;
      padding: 2rem;
    }
    .p-card-soon-inner .soon-icon {
      font-size: 2rem;
      margin-bottom: 0.8rem;
      opacity: 0.4;
    }
    .p-card-soon-inner p {
      font-size: 0.78rem;
      color: var(--text-light);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .p-card-soon-rings {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      border: 2px dashed var(--blush-light);
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
      min-height: 380px;
    }

    /* ──────────────────────────────────────────────────────── */
    /* INFO SECTIONS */
    /* ──────────────────────────────────────────────────────── */
    .info-section {
      padding: 4rem 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    .info-section.alt { 
      background: var(--white); 
    }
    .info-section h2 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 500;
      color: var(--navy);
      margin-bottom: 1.5rem;
      letter-spacing: 0.02em;
    }
    .info-section h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--crimson);
      margin-top: 2rem;
      margin-bottom: 0.8rem;
      letter-spacing: 0.04em;
    }
    .info-section p {
      margin-bottom: 1rem;
      line-height: 1.9;
      color: var(--text);
    }
    .info-section ul { 
      list-style: none; 
      padding-left: 0; 
    }
    .info-section li {
      padding-left: 1.5rem;
      margin-bottom: 0.6rem;
      position: relative;
      line-height: 1.8;
    }
    .info-section li:before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--blush);
      font-weight: 700;
    }
    .info-section .btn-contact {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.9rem 2rem;
      background: var(--crimson);
      color: var(--white);
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      transition: background 0.2s, transform 0.2s;
    }
    .info-section .btn-contact:hover {
      background: var(--crimson-deep);
      transform: translateY(-2px);
    }
    .info-section .note {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: 1rem;
      font-style: italic;
    }
    .info-section .email-display {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background: var(--blush-pale);
      border: 1px solid var(--blush-light);
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.95rem;
      color: var(--navy);
      margin-top: 0.5rem;
    }

    /* ──────────────────────────────────────────────────────── */
    /* ABOUT IMAGES */
    /* ──────────────────────────────────────────────────────── */
    .about-image {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
    }
    .about-images {
      display: flex;
      gap: 4rem;
      margin-top: 2rem;
      justify-content: center; 
    }
    .about-image-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .about-image-name {
      font-size: 0.85rem;
      color: var(--text-mid);
      margin-top: 0.5rem;
    }

    /* ──────────────────────────────────────────────────────── */
    /* GIFT WRAP IMAGES */
    /* ──────────────────────────────────────────────────────── */
    .gift-wrap-images {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      justify-content: center;
    }
    .gift-wrap-images figure {
      flex: 1;
      min-width: 250px;
      margin: 0;
    }
    .gift-wrap-images img {
      width: 100%;
      max-width: 300px;
      height: auto;
      border-radius: 12px;
    }

    /* ──────────────────────────────────────────────────────── */
    /* BUTTON BACK */
    /* ──────────────────────────────────────────────────────── */
    .btn-back {
      display: inline-block;
      font-size: 0.75rem;
      color: var(--text-mid) !important;
      text-decoration: none;
      letter-spacing: 0.08em;
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--blush);
      border-radius: 999px;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-back:hover {
      color: var(--crimson) !important;
      border-color: var(--crimson);
    }

    /* ──────────────────────────────────────────────────────── */
    /* COLOR NAV */
    /* ──────────────────────────────────────────────────────── */
    .color-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      padding: 1.5rem 2rem;
      justify-content: center;
    }

    /* ──────────────────────────────────────────────────────── */
    /* FOOTER */
    /* ──────────────────────────────────────────────────────── */
    footer {
      background: var(--navy);
      padding: 3.5rem 2rem 2.5rem;
      text-align: center;
    }
    .footer-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
    }
    .footer-logo-wrap img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 50%;
      opacity: 0.92;
    }
    .footer-brand {
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.16em;
    }
    .footer-tagline {
      font-size: 0.7rem;
      color: rgba(253,240,244,0.4);
      letter-spacing: 0.16em;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2rem;
    }
    .footer-links a {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--blush);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }
    .footer-links a:hover { 
      color: var(--white); 
    }
    .footer-copy {
